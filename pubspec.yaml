name: css_mastery_app
description: "Mission Aqsa - CSS Exam Preparation"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # ============ STATE MANAGEMENT ============
  provider: ^6.0.5
  
  # ============ NETWORKING ============
  http: ^1.1.0
  dio: ^5.3.3
  
  # ============ STORAGE ============
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  sqflite_common_ffi_web: ^0.4.2+3
  
  # ============ LOCAL NOTIFICATIONS ============
  flutter_local_notifications: ^16.0.0
  timezone: ^0.9.2
  
  # ============ UI/UX ============
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  
  # ============ UTILITY ============
  intl: ^0.18.1
  connectivity_plus: ^5.0.1
  url_launcher: ^6.2.1
  speech_to_text: ^6.6.0
  permission_handler: ^11.0.1
  share_plus: ^7.2.1
  pdf: ^3.12.0
  workmanager: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#6bb1ff"
    theme_color: "#6bb1ff"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/